<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shivam Distributors - Secure Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-container { background: #ffffff; padding: 40px 48px; width: 400px; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1); text-align: center; }
    .logo { font-size: 24px; font-weight: 800; color: #0f172a; margin-bottom: 8px; letter-spacing: -0.5px; }
    .subtitle { color: #64748b; font-size: 14px; margin-bottom: 32px; font-weight: 500; }
    .error-message { color: #b91c1c; font-size: 13px; font-weight: 600; margin-bottom: 20px; display: none; background-color: #fef2f2; padding: 10px; border-radius: 8px; border: 1px solid #fecaca; }
    .input-group { margin-bottom: 20px; text-align: left; }
    .input-group label { display: block; font-size: 13px; color: #475569; margin-bottom: 6px; font-weight: 600; }
    .input-group input { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; transition: all 0.2s ease; background-color: #f8fafc; color: #0f172a; }
    .input-group input:focus { border-color: #3b82f6; outline: none; background-color: #ffffff; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
    .login-btn { background-color: #3b82f6; color: white; font-weight: 600; font-size: 15px; padding: 12px; border: none; border-radius: 8px; cursor: pointer; width: 100%; transition: all 0.2s ease; margin-top: 10px; box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3); }
    .login-btn:hover { background-color: #2563eb; transform: translateY(-1px); box-shadow: 0 6px 8px -1px rgba(59, 130, 246, 0.4); }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo">Shivam Distributors</div>
    <div class="subtitle">Logistics & Fulfillment Portal</div>
    <div id="errorBox" class="error-message">Incorrect Username or Password!</div>
    
    <div class="input-group">
      <label>Username</label>
      <input type="text" id="usernameInput" placeholder="Enter your login ID">
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="Enter your password">
    </div>
    <button id="loginBtn" class="login-btn">Secure Login</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDKrxNZJZOhQf-h6GE5rkdFepfKYfaJOfQ",
      authDomain: "shiv-omkar.firebaseapp.com",
      databaseURL: "https://shiv-omkar-default-rtdb.firebaseio.com",
      projectId: "shiv-omkar",
      storageBucket: "shiv-omkar.firebasestorage.app",
      messagingSenderId: "18601432881",
      appId: "1:18601432881:web:2587c7bbfd5298da628210"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const defaultUsers = {
      "admin": { pass: "omkar123", role: "admin", name: "Admin" },
      "Pradip": { pass: "7600", role: "warehouse", name: "Pradip" },
      "Vikram": { pass: "vikram123", role: "warehouse", name: "Vikram" },
      "manager": { pass: "shivomkar1", role: "admin", name: "Manager" }
    };

    document.getElementById('loginBtn').addEventListener('click', async function() {
      const user = document.getElementById('usernameInput').value.trim();
      const pass = document.getElementById('passwordInput').value.trim();
      const errorBox = document.getElementById('errorBox');

      try {
        const snapshot = await get(ref(db, 'users'));
        let cloudUsers = snapshot.val();

        if (!cloudUsers) {
          await set(ref(db, 'users'), defaultUsers);
          cloudUsers = defaultUsers;
        }

        const activeUser = cloudUsers[user];
        
        if (activeUser && activeUser.pass === pass) {
          localStorage.setItem('shivOmkarRole', activeUser.role);
          localStorage.setItem('shivOmkarName', activeUser.name);
          localStorage.setItem('shivOmkarUserId', user); 
          window.location.href = 'dashboard.html';
        } else {
          errorBox.style.display = 'block';
        }
      } catch (error) {
  console.error("Login Error:", error);
  // CHANGE THIS LINE:
  errorBox.textContent = "Error: " + error.message; 
  errorBox.style.display = 'block';
}
    });
  </script>
</body>
</html>
